# Mapa de SALIDA (target): qué mensaje MIDI "Pioneer" emular por cada función.
#
# Dispositivo emulado: DDJ-SX2 (controller completo, Serato/rekordbox).
# Por qué el SX2 y no el DDJ-1000:
#   - En el perfil del DDJ-1000 el channel fader está COMENTADO (#ChannelFader): en el
#     hardware real es un fader analógico, Rekordbox no lo escucha por MIDI -> tu fader
#     del K3 no haría nada.
#   - En el DDJ-SX2 el ChannelFader (CC 0x13) está ACTIVO -> tu fader mueve el volumen real.
#   - Play/Cue/Sync/EQ usan los MISMOS códigos que el DDJ-1000, así que no perdés nada.
#   - Es el linaje probado por davr (usó DDJ-SX) con la técnica del puerto virtual.
# El target es INTERCAMBIABLE: si más adelante querés 4 decks nativos estilo DDJ-1000,
# se cambia este archivo + el nombre del puerto loopMIDI. Nada más.
#
# Convención Pioneer: cada DECK = un canal MIDI.
#   deck1 -> ch1, deck2 -> ch2, deck3 -> ch3, deck4 -> ch4
#   (en mido los canales son 0-based: deck1=0, deck2=1, deck3=2, deck4=3)
# Números en DECIMAL (el CSV oficial los trae en hex; acá van como int).

target:
  device_name: "PIONEER DDJ-SX2"   # nombre EXACTO que debe tener el puerto loopMIDI
  deck_to_channel: [0, 1, 2, 3]    # deck 1..4 -> canal MIDI 0-based

# Cada clave coincide con un control de config/xone_k3_input.yaml.
map:
  play_pause:   { type: note, number: 11 }   # 0x0B  PlayPause
  cue:          { type: note, number: 12 }   # 0x0C  Cue (set / play from cue)
  sync:         { type: note, number: 88 }   # 0x58  Sync On/Off
  # Estos son "KnobSliderHiRes" (14-bit) en el DDJ-SX2: RB espera MSB en CC N + LSB en CC N+32.
  # hires: true -> el router manda los DOS mensajes. Sin esto, el control casi no se mueve.
  eq_high:      { type: cc,   number: 7,  hires: true }   # 0x07  EQ High  (LSB en CC 39)
  eq_mid:       { type: cc,   number: 11, hires: true }   # 0x0B  EQ Mid   (LSB en CC 43)
  eq_low:       { type: cc,   number: 15, hires: true }   # 0x0F  EQ Low   (LSB en CC 47)
  fader:        { type: cc,   number: 19, hires: true }   # 0x13  ChannelFader volumen (LSB en CC 51)

  # EQ Kill: el botón mata/restaura esa banda. El router manda la banda de EQ a 0 y la
  # restaura a la posición del knob (reusa la memoria de posiciones). `kill` = función de EQ.
  eq_high_kill: { kill: eq_high }
  eq_mid_kill:  { kill: eq_mid }
  eq_low_kill:  { kill: eq_low }
  encoder_push: { type: note, number: 20 }    # 0x14  AutoLoop On/Off  (tu "Loop On/Off")

  # El encoder TURN del K3 es RELATIVO. Un giro a cada lado dispara half/double:
  encoder_turn:
    relative: true
    ccw: { type: note, number: 18 }   # 0x12  LoopHalf   (achicar loop)
    cw:  { type: note, number: 19 }   # 0x13  LoopDouble (agrandar loop)

  # Headphone Cue por deck (canal = deck). Tiene feedback -> el LED del K3 se prende solo.
  headphone_cue: { type: note, number: 84 }   # 0x54  Headphone CUE On/Off

  # Browse (navegación de biblioteca). Control GLOBAL en el canal 7 (mido 6) del "browser".
  # El scroll relativo del K3 dispara un paso a cada lado (Rotary del DDJ: 1 = un lado, 127 = otro).
  browse:
    relative: true
    channel: 6                              # canal 7 en 1-based; sección browser
    cw:  { type: cc, number: 64, value: 1 }    # 0x40  Browse rotary
    ccw: { type: cc, number: 64, value: 127 }

  # SCROLL push -> Forward (abrir/entrar carpeta). Canal 7 (mido 6) del browser.
  scroll_push: { type: note, number: 65, channel: 6 }   # 0x41  Library Forward (Folder Open)

# Con SHIFT apretado (note 15 del K3), estos controles usan un target alternativo.
# SHIFT + Encoder PUSH (col X) = Load Track a Deck X. En el DDJ-SX2 el Load va en el canal 7
# (mido 6) y el DECK lo define la NOTA (no el canal): 70/71/72/73 = deck 1/2/3/4.
shift_map:
  # SHIFT + Encoder TURN (col X) = JogSearch (scrubbear/buscar dentro del tema) en el Deck X.
  # Por deck (sin channel explícito -> usa el canal del deck). JogSearch es "Difference"
  # (relativo): value = delta con signo (1..63 = adelante, 65..127 = atrás en two's complement).
  # 'value' regula la VELOCIDAD del scrub: subilo para ir más rápido, bajalo para más fino.
  encoder_turn:
    relative: true
    cw:  { type: cc, number: 31, value: 120 }   # 0x1F  JogSearch ADELANTE (derecha) — JogSearch invierte el signo
    ccw: { type: cc, number: 31, value: 8 }     # 0x1F  JogSearch ATRÁS (izquierda)

  encoder_push:
    type: note
    kind: trigger
    channel: 6
    notes: [70, 71, 72, 73]   # 0x46-0x49  Load a Deck 1-4
  scroll_push:                 # SHIFT + SCROLL push = Back (subir / cerrar carpeta)
    type: note
    kind: trigger
    channel: 6
    number: 101               # 0x65  Library Back (Folder Close)

# Estados que el puente FUERZA a ON al arrancar, para que sea plug-and-play en cualquier PC.
# El puente lee el estado real por feedback y solo prende si está en OFF (sin doble-toggle).
# Lo hace UNA vez al inicio; si después los apagás a mano, no los vuelve a tocar.
#   scope: per_deck -> enforcea en cada deck (1-4) de forma independiente
#   scope: once     -> enforcea una sola vez (para toggles realmente globales)
# Nota: en Rekordbox 5.8.7 el Quantize es POR DECK (cada deck tiene su toggle), así que va per_deck.
startup_enable:
  master_tempo: { type: note, number: 26,  scope: per_deck }   # 0x1A  MasterTempo/KeyLock On/Off
  quantize:     { type: note, number: 106, scope: per_deck }   # 0x6A  Quantize On/Off (por deck)
