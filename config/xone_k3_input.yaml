# Mapa de ENTRADA: qué manda cada control del Xone K3 (Layer 1, config de fábrica actual).
# Patrón: offset +1 por columna (deck). Col 1..4 = índices 0..3 de cada lista.
#
# Canal CONFIRMADO con monitor.py (jul/2026): el K3 manda en canal 15 (1-based) = nibble 0xE.
# En mido (0-based) eso es channel 14. NO era hex F/16 como sugería el prompt.
# El router no filtra por canal: identifica cada control por su número de CC/Note.
device:
  name: "Xone K3"
  midi_channel: 15        # 1-based (como lo muestra el editor). En mido/0-based = 14.
  shift_note: 15          # el botón SHIFT manda Note 15 (on al apretar, off al soltar)

# Cada control lista los números por columna (deck 1, 2, 3, 4).
controls:
  encoder_turn:
    label: "Encoder TURN (Loop Size)"
    type: cc
    kind: relative
    cc: [0, 1, 2, 3]

  encoder_push:
    label: "Encoder PUSH (Loop On/Off)"
    type: note
    kind: trigger
    note: [52, 53, 54, 55]

  # 'default' = valor seguro para el PRIMER arranque (sin historial guardado).
  # EQ al centro (64 = neutro, sin cortar ni realzar); fader abajo (0 = silencio).
  eq_high:
    label: "EQ HIGH"
    type: cc
    kind: absolute        # 0-127
    cc: [4, 5, 6, 7]
    default: 64

  eq_mid:
    label: "EQ MID"
    type: cc
    kind: absolute
    cc: [8, 9, 10, 11]
    default: 64

  eq_low:
    label: "EQ LOW"
    type: cc
    kind: absolute
    cc: [12, 13, 14, 15]
    default: 64

  fader:
    label: "Fader (Volumen)"
    type: cc
    kind: absolute
    cc: [16, 17, 18, 19]
    default: 0

  play_pause:
    label: "Play/Pause"
    type: note
    kind: trigger
    note: [24, 25, 26, 27]

  cue:
    label: "Cue (hold)"
    type: note
    kind: gate            # nota on al apretar, off al soltar
    note: [28, 29, 30, 31]

  sync:
    label: "Sync"
    type: note
    kind: trigger
    note: [32, 33, 34, 35]

  # Grilla inferior, fila 1 (columnas 1-4) -> Headphone Cue por deck.
  headphone_cue:
    label: "Headphone Cue (grilla fila 1)"
    type: note
    kind: trigger
    note: [36, 37, 38, 39]

  # EQ Kill: switches al lado de cada knob de EQ. Cada botón mata/restaura esa banda del deck.
  eq_high_kill:
    label: "EQ High Kill"
    type: note
    kind: trigger
    note: [48, 49, 50, 51]
  eq_mid_kill:
    label: "EQ Mid Kill"
    type: note
    kind: trigger
    note: [44, 45, 46, 47]
  eq_low_kill:
    label: "EQ Low Kill"
    type: note
    kind: trigger
    note: [40, 41, 42, 43]

  # Encoder SCROLL (giro) -> Browse. Es un control GLOBAL (uno solo, no por deck).
  browse:
    label: "Browse (scroll turn)"
    type: cc
    kind: relative
    cc: [21]

  # Encoder SCROLL (push) -> Forward (entrar a carpeta). Con SHIFT -> Back (al árbol izq.).
  scroll_push:
    label: "Scroll push (browser Forward/Back)"
    type: note
    kind: trigger
    note: [14]

# SHIFT + Encoder PUSH (col X) = Load Track a Deck X. La nota del push (52-55) no cambia con
# SHIFT; el bridge lleva el estado shift_pressed y usa shift_map (ver rekordbox_target.yaml).
# Resto de la grilla inferior: libre para Hot Cues u otras funciones.
