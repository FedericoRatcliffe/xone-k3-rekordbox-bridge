# Mapa de ENTRADA: qué manda cada control del Xone K3 (Layer 1, config de fábrica actual).
# Patrón: offset +1 por columna (deck). Col 1..4 = índices 0..3 de cada lista.
#
# Canal CONFIRMADO con monitor.py (jul/2026): el K3 manda en canal 15 (1-based) = nibble 0xE.
# En mido (0-based) eso es channel 14. NO era hex F/16 como sugería el prompt.
# El router no filtra por canal: identifica cada control por su número de CC/Note.
device:
  name: "Xone K3"
  midi_channel: 15        # 1-based (como lo muestra el editor). En mido/0-based = 14.
  # El botón SHIFT manda OTRA nota según la layer activa (Latching Layers): 15 en Layer 1,
  # 19 en Layer 2 (patrón +4, igual que el botón LAYER: 12/16/20). Todas cuentan como SHIFT.
  shift_note: [15, 19]

# Cada control lista los números por columna (deck 1, 2, 3, 4).
controls:
  encoder_turn:
    label: "Encoder TURN (Loop Size)"
    type: cc
    kind: relative
    cc: [0, 1, 2, 3]

  encoder_push:
    label: "Encoder PUSH (Loop On/Off)"
    type: note
    kind: trigger
    note: [52, 53, 54, 55]

  # 'default' = valor seguro para el PRIMER arranque (sin historial guardado).
  # EQ al centro (64 = neutro, sin cortar ni realzar); fader abajo (0 = silencio).
  eq_high:
    label: "EQ HIGH"
    type: cc
    kind: absolute        # 0-127
    cc: [4, 5, 6, 7]
    default: 64

  eq_mid:
    label: "EQ MID"
    type: cc
    kind: absolute
    cc: [8, 9, 10, 11]
    default: 64

  eq_low:
    label: "EQ LOW"
    type: cc
    kind: absolute
    cc: [12, 13, 14, 15]
    default: 64

  fader:
    label: "Fader (Volumen)"
    type: cc
    kind: absolute
    cc: [16, 17, 18, 19]
    default: 0

  play_pause:
    label: "Play/Pause"
    type: note
    kind: trigger
    note: [24, 25, 26, 27]

  cue:
    label: "Cue (hold)"
    type: note
    kind: gate            # nota on al apretar, off al soltar
    note: [28, 29, 30, 31]

  sync:
    label: "Sync"
    type: note
    kind: trigger
    note: [32, 33, 34, 35]

  # Grilla inferior, fila 1 (columnas 1-4) -> Headphone Cue por deck.
  headphone_cue:
    label: "Headphone Cue (grilla fila 1)"
    type: note
    kind: trigger
    note: [36, 37, 38, 39]

  # EQ Kill: switches al lado de cada knob de EQ. Cada botón mata/restaura esa banda del deck.
  eq_high_kill:
    label: "EQ High Kill"
    type: note
    kind: trigger
    note: [48, 49, 50, 51]
  eq_mid_kill:
    label: "EQ Mid Kill"
    type: note
    kind: trigger
    note: [44, 45, 46, 47]
  eq_low_kill:
    label: "EQ Low Kill"
    type: note
    kind: trigger
    note: [40, 41, 42, 43]

  # --- Layer 2 (FX) — códigos que manda el K3 en Layer 2 (Latching Layers = "All Controls").
  # Solo se mandan en Layer 2, así que no chocan con los de Layer 1.
  # Esquema (Opción B): perilla de ARRIBA de cada columna = Sound Color FX por canal (filtro);
  # encoder col 1/2 = Beat FX1/FX2 (select+beat); 2ª perilla col 1/2 = depth; 1º botón col 1/2 = on/off.
  # Códigos confirmados con monitor.py en Layer 2 (jul/2026).

  # Sound Color FX (perilla de ARRIBA, una por columna) -> filtro/color por canal 1-4.
  # Absoluto: el centro (64) = filtro apagado; a cada lado el efecto (según tipo elegido en RB).
  cfx:
    label: "Sound Color FX (perilla arriba, por canal)"
    type: cc
    kind: absolute
    cc: [26, 27, 28, 29]
    default: 64

  fx_select:                 # Encoder PUSH (L2) col 1/2 -> cambiar de efecto de FX1/FX2
    label: "FX Select (L2 encoder push col1/2)"
    type: note
    kind: trigger
    note: [88, 89]
  fx_beat:                   # Encoder TURN (L2) col 1/2 -> beat/time de FX1/FX2
    label: "FX Beat/Time (L2 encoder turn col1/2)"
    type: cc
    kind: relative
    cc: [22, 23]
  fx_depth:                  # 2ª perilla (L2) col 1/2 -> cantidad de efecto de FX1/FX2
    label: "FX Depth (L2 2nd knob col1/2)"
    type: cc
    kind: absolute
    cc: [30, 31]
  fx_onoff:                  # 1º botón (L2) col 1/2 -> prende/apaga FX1/FX2
    label: "FX On/Off (L2 button col1/2)"
    type: note
    kind: trigger
    note: [84, 85]

  # Encoder SCROLL (giro) -> Browse. Es un control GLOBAL (uno solo, no por deck).
  browse:
    label: "Browse (scroll turn)"
    type: cc
    kind: relative
    cc: [21]

  # Encoder SCROLL (push) -> Forward (entrar a carpeta). Con SHIFT -> Back (al árbol izq.).
  scroll_push:
    label: "Scroll push (browser Forward/Back)"
    type: note
    kind: trigger
    note: [14]

# SHIFT + Encoder PUSH (col X) = Load Track a Deck X. La nota del push (52-55) no cambia con
# SHIFT; el bridge lleva el estado shift_pressed y usa shift_map (ver rekordbox_target.yaml).
# Resto de la grilla inferior: libre para Hot Cues u otras funciones.
